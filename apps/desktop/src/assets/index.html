<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>EIGU Desktop Worker</title>
  <style>
    :root {
      --bg-dark: #0f172a;
      --card-bg: #1e293b;
      --card-border: #334155;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --danger: #ef4444;
      --danger-hover: #dc2626;
      --success: #10b981;
      --radius: 12px;
      --font-sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      --font-mono: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
    }

    body {
      background-color: var(--bg-dark);
      color: var(--text-main);
      font-family: var(--font-sans);
      margin: 0;
      padding: 48px 32px 32px 32px;
      display: flex;
      justify-content: center;
      min-height: 100vh;
      box-sizing: border-box;
      user-select: none;
    }

    /* Native Title Bar Drag Area */
    .title-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 38px;
      -webkit-app-region: drag;
      z-index: 9999;
    }

    /* Allow clicking on elements inside the window */
    input, button, .log-console, .drop-zone {
      -webkit-app-region: no-drag;
      user-select: auto;
    }

    .container {
      max-width: 640px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* Header */
    .header {
      text-align: center;
    }
    .header h1 {
      font-size: 26px;
      font-weight: 700;
      margin: 0 0 8px 0;
      background: linear-gradient(90deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }
    .header p {
      color: var(--text-muted);
      font-size: 14px;
      margin: 0;
    }

    /* Input Section */
    .input-section {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
    }

    .drop-zone {
      border: 2px dashed var(--card-border);
      border-radius: 8px;
      padding: 32px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
      background: transparent;
    }
    .drop-zone:hover:not(.disabled) {
      border-color: var(--primary);
      background: rgba(59, 130, 246, 0.05);
    }
    .drop-zone.drag-over {
      border-color: var(--primary);
      background: rgba(59, 130, 246, 0.1);
      transform: scale(1.01);
    }
    .drop-zone.disabled {
      opacity: 0.5;
      cursor: not-allowed;
      border-color: var(--card-border);
      background: transparent;
    }

    .drop-content .icon {
      font-size: 32px;
      margin-bottom: 12px;
      display: block;
      transition: transform 0.2s;
    }
    .drop-zone:hover:not(.disabled) .drop-content .icon {
      transform: translateY(-4px);
    }
    .drop-content p {
      margin: 0;
      font-size: 14px;
      color: var(--text-muted);
      font-weight: 500;
    }
    .drop-content span {
      font-size: 12px;
      color: #64748b;
      margin-top: 4px;
      display: block;
    }

    /* File Info */
    .file-info {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.2);
      border-radius: 8px;
      padding: 16px;
      animation: fadeIn 0.3s ease-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .file-info .left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .file-info .icon {
      font-size: 20px;
    }
    .file-info .file-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--success);
      word-break: break-all;
      text-align: left;
    }
    .icon-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 14px;
      padding: 6px;
      border-radius: 6px;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .icon-btn:hover {
      background: rgba(239, 68, 68, 0.2);
      color: var(--danger);
    }

    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      color: #64748b;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid var(--card-border);
    }
    .divider::before { margin-right: 16px; }
    .divider::after { margin-left: 16px; }

    .yt-input-wrapper {
      position: relative;
    }
    .yt-input-wrapper input {
      width: 100%;
      padding: 14px 16px;
      background: rgba(15, 23, 42, 0.5);
      border: 1px solid var(--card-border);
      border-radius: 8px;
      color: var(--text-main);
      font-family: var(--font-sans);
      font-size: 14px;
      outline: none;
      transition: all 0.2s;
      box-sizing: border-box;
    }
    .yt-input-wrapper input:focus:not(:disabled) {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
    }
    .yt-input-wrapper input:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      background: rgba(15, 23, 42, 0.2);
    }

    /* Actions */
    .output-settings {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(15, 23, 42, 0.5);
      border: 1px solid var(--card-border);
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 16px;
      font-size: 13px;
    }
    .output-settings .label {
      color: var(--text-muted);
      font-weight: 500;
      white-space: nowrap;
    }
    .output-settings .path {
      flex: 1;
      text-align: right;
      color: var(--primary);
      margin: 0 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      direction: ltr;
    }
    .output-settings .icon-btn {
      background: rgba(59, 130, 246, 0.1);
      color: var(--primary);
      padding: 6px 12px;
      font-weight: 500;
      white-space: nowrap;
    }
    .output-settings .icon-btn:hover {
      background: rgba(59, 130, 246, 0.2);
    }
    .split-settings {
      background: rgba(15, 23, 42, 0.5);
      border: 1px solid var(--card-border);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      text-align: left;
    }
    .split-settings label {
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 500;
    }
    .split-settings select {
      width: 100%;
      padding: 10px 12px;
      background: #0f172a;
      border: 1px solid var(--card-border);
      border-radius: 6px;
      color: var(--text-main);
      font-family: var(--font-sans);
      outline: none;
    }
    .split-settings select:focus {
      border-color: var(--primary);
    }
    .custom-time-inputs {
      display: flex;
      align-items: center;
      gap: 8px;
      animation: fadeIn 0.2s ease-out;
    }
    .custom-time-inputs input {
      flex: 1;
      padding: 8px 12px;
      background: #0f172a;
      border: 1px solid var(--card-border);
      border-radius: 6px;
      color: var(--text-main);
      text-align: center;
      outline: none;
    }
    .custom-time-inputs input:focus {
      border-color: var(--primary);
    }
    .btn {
      width: 100%;
      padding: 16px 24px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: var(--font-sans);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-primary {
      background: var(--primary);
      color: white;
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
    }
    .btn-primary:hover:not(:disabled) {
      background: var(--primary-hover);
      transform: translateY(-1px);
    }
    .btn-primary:active:not(:disabled) {
      transform: translateY(0);
    }
    .btn-primary:disabled {
      background: var(--card-border);
      color: #64748b;
      cursor: not-allowed;
      box-shadow: none;
    }
    .btn-danger {
      background: var(--danger);
      color: white;
      box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
    }
    .btn-danger:hover {
      background: var(--danger-hover);
      transform: translateY(-1px);
    }

    /* Progress Section */
    .progress-section {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      animation: fadeIn 0.3s ease-out;
    }
    .status-header {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      font-weight: 500;
    }
    #status-text {
      color: #60a5fa;
    }
    #progress-percent {
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
    }
    .progress-track {
      width: 100%;
      height: 8px;
      background: rgba(15, 23, 42, 0.8);
      border-radius: 4px;
      overflow: hidden;
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.2);
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #3b82f6, #8b5cf6, #10b981);
      background-size: 200% 100%;
      width: 0%;
      transition: width 0.3s ease-out;
      animation: gradientMove 2s linear infinite;
    }

    @keyframes gradientMove {
      0% { background-position: 100% 0; }
      100% { background-position: -100% 0; }
    }

    /* Logs */
    .log-console {
      background: #09090b;
      border: 1px solid #27272a;
      border-radius: var(--radius);
      padding: 16px;
      height: 250px;
      overflow-y: auto;
      font-family: var(--font-mono);
      font-size: 13px;
      line-height: 1.6;
      text-align: left;
      box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
    }

    .log-entry {
      display: flex;
      gap: 12px;
      padding: 4px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
      animation: slideIn 0.2s ease-out;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-5px); }
      to { opacity: 1; transform: translateX(0); }
    }
    .log-entry:last-child {
      border-bottom: none;
    }
    .log-time {
      color: #52525b;
      flex-shrink: 0;
    }
    .log-tag {
      font-weight: 600;
      flex-shrink: 0;
      width: 80px;
    }
    .log-msg {
      color: #d4d4d8;
      word-break: break-word;
      white-space: pre-wrap;
    }

    /* Tags colors */
    .tag-info { color: #3b82f6; }
    .tag-error { color: #ef4444; }
    .tag-warn { color: #f59e0b; }
    .tag-success { color: #10b981; }
    .tag-ffmpeg { color: #8b5cf6; }

    .hidden {
      display: none !important;
    }

    /* Scrollbar styling for log console */
    .log-console::-webkit-scrollbar {
      width: 8px;
    }
    .log-console::-webkit-scrollbar-track {
      background: transparent;
    }
    .log-console::-webkit-scrollbar-thumb {
      background: #27272a;
      border-radius: 4px;
    }
    .log-console::-webkit-scrollbar-thumb:hover {
      background: #3f3f46;
    }
  </style>
</head>
<body>
  <div class="title-bar"></div>
  <div class="container">
    <div class="header">
      <h1>EIGU Anti-detect Engine</h1>
      <p>Kéo thả Video hoặc dán link YouTube để bắt đầu tự động hóa.</p>
    </div>
    
    <div class="input-section">
      <!-- Drag & Drop Zone -->
      <div id="drop-zone" class="drop-zone">
        <div id="drop-content" class="drop-content">
          <span class="icon">📁</span>
          <p>Kéo thả file .mp4 vào đây</p>
          <span>hoặc bấm để chọn file</span>
        </div>
        <!-- Selected File Info -->
        <div id="file-info" class="file-info hidden">
          <div class="left">
            <span class="icon">📹</span>
            <span id="file-name" class="file-name"></span>
          </div>
          <button id="clear-file-btn" class="icon-btn" title="Xóa file">❌</button>
        </div>
      </div>
      
      <input type="file" id="file-input" accept=".mp4" class="hidden" />

      <div class="divider">HOẶC</div>

      <!-- YouTube Link -->
      <div class="yt-input-wrapper">
        <input type="text" id="youtube-input" placeholder="Dán link YouTube (VD: https://youtu.be/...)" autocomplete="off" spellcheck="false" />
      </div>
    </div>

    <div class="action-section">
      <div class="split-settings" id="split-settings">
        <label>Chế độ cắt Video (Mở rộng):</label>
        <select id="split-mode-select">
          <option value="split_1">Cắt đều mỗi 1 phút / video</option>
          <option value="split_2">Cắt đều mỗi 2 phút / video</option>
          <option value="split_3">Cắt đều mỗi 3 phút / video</option>
          <option value="split_5" selected>Cắt đều mỗi 5 phút / video</option>
          <option value="split_10">Cắt đều mỗi 10 phút / video</option>
          <option value="split_20">Cắt đều mỗi 20 phút / video</option>
          <option value="custom">Cắt theo khoảng thời gian tùy chỉnh</option>
          <option value="ai" disabled>Cắt tự động bằng AI (Whisper/LLM - Coming soon)</option>
        </select>
        <div id="custom-time-inputs" class="custom-time-inputs hidden">
          <input type="text" id="time-start" placeholder="Từ (VD: 00:00:00)" />
          <span style="color: #64748b; font-size: 12px;">→</span>
          <input type="text" id="time-end" placeholder="Đến (VD: 00:01:20)" />
        </div>

        <label style="margin-top: 8px;">Tỉ lệ khung hình (Aspect Ratio):</label>
        <select id="aspect-ratio-select">
          <option value="original">Giữ nguyên bản</option>
          <option value="9:16">9:16 (TikTok, Shorts, Reels)</option>
          <option value="16:9">16:9 (YouTube)</option>
          <option value="1:1">1:1 (Vuông - Instagram)</option>
        </select>

        <label style="margin-top: 8px;">Chế độ Dịch Thuật (Voice/TTS):</label>
        <select id="tts-mode" disabled title="Tính năng cần kết nối Server GPU (SoniTranslate) - Đang phát triển">
          <option value="none">Không dịch (Giữ nguyên âm thanh gốc)</option>
          <option value="soni">Dịch tự động SoniTranslate AI (Sắp ra mắt)</option>
        </select>

        <label style="display: flex; align-items: center; gap: 8px; margin-top: 8px; cursor: pointer;">
          <input type="checkbox" id="auto-part-text" style="width: 16px; height: 16px; cursor: pointer;" />
          Tự động đánh số "Part 1/N" lên từng video cắt
        </label>

        <hr style="border: 0; border-top: 1px solid #334155; margin: 15px 0;" />
        <label style="font-weight: 600; color: #38bdf8; margin-bottom: 8px; display: block;">Tính Năng Anti-Detect & Tối Ưu:</label>

        <label style="display: flex; align-items: center; gap: 8px; margin-top: 8px; cursor: pointer;">
          <input type="checkbox" id="opt-metadata" style="width: 16px; height: 16px; cursor: pointer;" checked />
          Xóa siêu dữ liệu (Metadata Stripping) - ⚡ Stream Copy
        </label>
        
        <label style="display: flex; align-items: center; gap: 8px; margin-top: 8px; cursor: pointer;">
          <input type="checkbox" id="opt-noise" style="width: 16px; height: 16px; cursor: pointer;" />
          Thêm nhiễu hạt & Cân bằng sáng (Noise & EQ) - 🐢 Bắt buộc Encode
        </label>

        <label style="display: flex; align-items: center; gap: 8px; margin-top: 8px; cursor: pointer;">
          <input type="checkbox" id="opt-decimate" style="width: 16px; height: 16px; cursor: pointer;" />
          Xóa khung hình tĩnh trùng lặp (Decimation) - 🐢 Bắt buộc Encode
        </label>

        <label style="display: flex; align-items: center; gap: 8px; margin-top: 8px; cursor: pointer;">
          <input type="checkbox" id="opt-audio-pan" style="width: 16px; height: 16px; cursor: pointer;" />
          Đảo chiều âm thanh 3D (Spatial Panning) - 🐢 Bắt buộc Audio Encode
        </label>
      </div>

      <div class="output-settings" id="output-settings">
        <span class="label">Thư mục lưu:</span>
        <span class="path" id="output-path-display">Mặc định (Downloads/eigu/outputs)</span>
        <button id="change-output-btn" class="icon-btn" title="Thay đổi thư mục lưu">Thay đổi</button>
      </div>
      <button id="start-btn" class="btn btn-primary" disabled>
        <span>Bắt đầu</span>
      </button>
      <button id="cancel-btn" class="btn btn-danger hidden">
        <span>Hủy tiến trình</span>
      </button>
    </div>

    <!-- Progress Bar -->
    <div id="progress-section" class="progress-section hidden">
      <div class="status-header">
        <span id="status-text">Đang khởi tạo...</span>
        <span id="progress-percent">0%</span>
      </div>
      <div class="progress-track">
        <div id="progress-fill" class="progress-fill"></div>
      </div>
    </div>

    <!-- Terminal Logs -->
    <details id="log-details" class="log-details" style="margin-top: 15px; user-select: none;">
      <summary style="cursor: pointer; font-weight: bold; color: #f8fafc; font-size: 14px;">Hiển thị chi tiết / Logs</summary>
      <div id="log-console" class="log-console" style="margin-top: 10px;">
      </div>
    </details>
  </div>

  <script>
    const { ipcRenderer, webUtils } = require('electron');

    // DOM Elements
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const dropContent = document.getElementById('drop-content');
    const fileInfo = document.getElementById('file-info');
    const fileNameEl = document.getElementById('file-name');
    const clearFileBtn = document.getElementById('clear-file-btn');
    const youtubeInput = document.getElementById('youtube-input');
    const startBtn = document.getElementById('start-btn');
    const cancelBtn = document.getElementById('cancel-btn');
    const progressSection = document.getElementById('progress-section');
    const progressFill = document.getElementById('progress-fill');
    const progressPercent = document.getElementById('progress-percent');
    const statusText = document.getElementById('status-text');
    const logConsole = document.getElementById('log-console');
    const changeOutputBtn = document.getElementById('change-output-btn');
    const outputPathDisplay = document.getElementById('output-path-display');
    const outputSettings = document.getElementById('output-settings');
    
    const splitModeSelect = document.getElementById('split-mode-select');
    const customTimeInputs = document.getElementById('custom-time-inputs');
    const timeStartInput = document.getElementById('time-start');
    const timeEndInput = document.getElementById('time-end');
    const splitSettings = document.getElementById('split-settings');
    const aspectRatioSelect = document.getElementById('aspect-ratio-select');
    const autoPartTextInput = document.getElementById('auto-part-text');
    const ttsModeSelect = document.getElementById('tts-mode');

    const optMetadata = document.getElementById('opt-metadata');
    const optNoise = document.getElementById('opt-noise');
    const optDecimate = document.getElementById('opt-decimate');
    const optAudioPan = document.getElementById('opt-audio-pan');

    // STATE MANAGEMENT
    const appState = {
      mode: 'idle', // 'idle' | 'local' | 'youtube' | 'processing'
      file: null, // { path, name }
      youtubeLink: '',
      outputPath: null, // null means default
      options: {
        splitMode: 'split_5',
        customStart: '',
        customEnd: '',
        aspectRatio: 'original',
        autoPartText: false,
        ttsMode: 'none',
        metadataStripping: true,
        noiseInjection: false,
        decimation: false,
        audioSpatialPanning: false
      },
      progress: 0,
      status: 'Đang chờ...',
      isDragOver: false
    };

    function getFormattedTime() {
      const now = new Date();
      return now.toLocaleTimeString('en-GB', { hour12: false }) + '.' + String(now.getMilliseconds()).padStart(3, '0');
    }

    // STATE SYNC RENDERER
    function render() {
      // 1. UI Status based on Mode
      const isProcessing = appState.mode === 'processing';
      const isLocal = appState.mode === 'local';
      const isYoutube = appState.mode === 'youtube';

      // Start/Cancel Buttons
      if (isProcessing) {
        startBtn.classList.add('hidden');
        cancelBtn.classList.remove('hidden');
        progressSection.classList.remove('hidden');
        outputSettings.style.opacity = '0.5';
        splitSettings.style.opacity = '0.5';
        changeOutputBtn.disabled = true;
        splitModeSelect.disabled = true;
        timeStartInput.disabled = true;
        timeEndInput.disabled = true;
        aspectRatioSelect.disabled = true;
        autoPartTextInput.disabled = true;
      } else {
        startBtn.classList.remove('hidden');
        cancelBtn.classList.add('hidden');
        outputSettings.style.opacity = '1';
        splitSettings.style.opacity = '1';
        changeOutputBtn.disabled = false;
        splitModeSelect.disabled = false;
        timeStartInput.disabled = false;
        timeEndInput.disabled = false;
        aspectRatioSelect.disabled = false;
        autoPartTextInput.disabled = false;
      }

      startBtn.disabled = !(isLocal || isYoutube) || isProcessing;

      // Splitting UI
      if (appState.options.splitMode === 'custom') {
        customTimeInputs.classList.remove('hidden');
      } else {
        customTimeInputs.classList.add('hidden');
      }

      // Youtube Input
      youtubeInput.disabled = isProcessing || isLocal;
      if (!isProcessing && youtubeInput.value !== appState.youtubeLink) {
        youtubeInput.value = appState.youtubeLink;
      }

      // Drop Zone & File Info
      if (isProcessing || isYoutube) {
        dropZone.classList.add('disabled');
      } else {
        dropZone.classList.remove('disabled');
      }

      if (appState.isDragOver && !isProcessing && !isYoutube) {
        dropZone.classList.add('drag-over');
      } else {
        dropZone.classList.remove('drag-over');
      }

      if (appState.file) {
        dropContent.classList.add('hidden');
        fileInfo.classList.remove('hidden');
        fileNameEl.innerText = appState.file.name;
        dropZone.style.borderColor = 'var(--success)';
        dropZone.style.background = 'transparent';
        clearFileBtn.style.display = isProcessing ? 'none' : 'flex';
      } else {
        dropContent.classList.remove('hidden');
        fileInfo.classList.add('hidden');
        dropZone.style.borderColor = '';
        dropZone.style.background = '';
      }

      // Progress Bar
      progressFill.style.width = `${appState.progress}%`;
      progressPercent.innerText = `${appState.progress}%`;
      statusText.innerText = appState.status;
    }

    // ACTIONS
    function handleFileSelected(fileObj) {
      if (!fileObj || !fileObj.name.toLowerCase().endsWith('.mp4')) {
        alert('Chỉ hỗ trợ định dạng .mp4');
        return;
      }
      const realPath = webUtils ? webUtils.getPathForFile(fileObj) : fileObj.path;
      appState.file = { path: realPath, name: fileObj.name };
      appState.youtubeLink = '';
      appState.mode = 'local';
      render();
    }

    function handleClearFile() {
      if (appState.mode === 'processing') return;
      appState.file = null;
      appState.mode = 'idle';
      fileInput.value = '';
      render();
    }

    function handleYoutubeInput(value) {
      const val = value.trim();
      appState.youtubeLink = val;
      if (val.length > 0) {
        appState.mode = 'youtube';
        appState.file = null; // Clear file just in case
      } else {
        appState.mode = 'idle';
      }
      render();
    }

    function addLog(msg) {
      // Bỏ qua các log dạng debug (FFmpeg/lệnh)
      if (msg.includes('Kích hoạt lệnh') || msg.includes('Hoàn tất quá trình băm') || msg.includes('ffmpeg version') || msg.includes('Stream #')) {
        return;
      }

      let tagClass = 'tag-info';
      let tag = '[INFO]';
      
      if (msg.includes('ERROR') || msg.includes('Lỗi') || msg.includes('❌') || msg.includes('ENOENT')) {
        tagClass = 'tag-error';
        tag = '[ERROR]';
      } else if (msg.includes('WARN') || msg.includes('⚠️')) {
        tagClass = 'tag-warn';
        tag = '[WARN]';
      } else if (msg.includes('✅') || msg.includes('Hoàn tất')) {
        tagClass = 'tag-success';
        tag = '[SUCCESS]';
      } else if (msg.includes('Kích hoạt lệnh') || msg.includes('FFmpeg') || msg.includes('ffmpeg')) {
        tagClass = 'tag-ffmpeg';
        tag = '[FFMPEG]';
      }
      
      let cleanMsg = msg.replace(/^>\s*/, '');
      
      const el = document.createElement('div');
      el.className = 'log-entry';
      el.innerHTML = `
        <span class="log-time">${getFormattedTime()}</span>
        <span class="log-tag ${tagClass}">${tag}</span>
        <span class="log-msg">${cleanMsg}</span>
      `;
      
      logConsole.appendChild(el);
      logConsole.scrollTop = logConsole.scrollHeight;
    }

    // DOM EVENT LISTENERS
    youtubeInput.addEventListener('input', (e) => {
      handleYoutubeInput(e.target.value);
    });

    dropZone.addEventListener('click', () => {
      if (appState.mode === 'processing' || appState.mode === 'youtube') return;
      fileInput.click();
    });

    fileInput.addEventListener('change', (e) => {
      if (e.target.files.length > 0) {
        handleFileSelected(e.target.files[0]);
      }
    });

    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      if (appState.mode === 'processing' || appState.mode === 'youtube') return;
      appState.isDragOver = true;
      render();
    });

    dropZone.addEventListener('dragleave', (e) => {
      e.preventDefault();
      appState.isDragOver = false;
      render();
    });

    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      appState.isDragOver = false;
      if (appState.mode === 'processing' || appState.mode === 'youtube') {
        render();
        return;
      }
      if (e.dataTransfer.files.length > 0) {
        handleFileSelected(e.dataTransfer.files[0]);
      } else {
        render();
      }
    });

    clearFileBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      handleClearFile();
    });

    splitModeSelect.addEventListener('change', (e) => {
      appState.options.splitMode = e.target.value;
      render();
    });

    timeStartInput.addEventListener('input', (e) => {
      appState.options.customStart = e.target.value;
    });

    timeEndInput.addEventListener('input', (e) => {
      appState.options.customEnd = e.target.value;
    });

    aspectRatioSelect.addEventListener('change', (e) => {
      appState.options.aspectRatio = e.target.value;
    });

    autoPartTextInput.addEventListener('change', (e) => {
      appState.options.autoPartText = e.target.checked;
    });

    optMetadata.addEventListener('change', (e) => {
      appState.options.metadataStripping = e.target.checked;
    });

    optNoise.addEventListener('change', (e) => {
      appState.options.noiseInjection = e.target.checked;
    });

    optDecimate.addEventListener('change', (e) => {
      appState.options.decimation = e.target.checked;
    });

    optAudioPan.addEventListener('change', (e) => {
      appState.options.audioSpatialPanning = e.target.checked;
    });

    changeOutputBtn.addEventListener('click', async () => {
      if (appState.mode === 'processing') return;
      const result = await ipcRenderer.invoke('select-output-folder');
      if (result) {
        appState.outputPath = result;
        outputPathDisplay.innerText = result;
      }
    });

    startBtn.addEventListener('click', () => {
      if (appState.mode !== 'local' && appState.mode !== 'youtube') return;
      
      const payloadType = appState.mode;
      const data = payloadType === 'local' ? appState.file.path : appState.youtubeLink;

      appState.mode = 'processing';
      appState.progress = 0;
      appState.status = 'Đang khởi tạo...';
      render();

      ipcRenderer.send('start-workflow', { 
        type: payloadType, 
        data, 
        outputPath: appState.outputPath,
        options: {
          splitMode: appState.options.splitMode,
          customStart: appState.options.customStart,
          customEnd: appState.options.customEnd,
          aspectRatio: appState.options.aspectRatio,
          autoPartText: appState.options.autoPartText,
          ttsMode: appState.options.ttsMode,
          metadataStripping: appState.options.metadataStripping,
          noiseInjection: appState.options.noiseInjection,
          decimation: appState.options.decimation,
          audioSpatialPanning: appState.options.audioSpatialPanning
        }
      });
    });

    cancelBtn.addEventListener('click', () => {
      if (appState.mode !== 'processing') return;
      appState.status = 'Đang gửi lệnh hủy...';
      render();
      ipcRenderer.send('cancel-workflow');
    });

    // IPC LISTENERS
    ipcRenderer.on('workflow-progress', (event, percent) => {
      appState.progress = percent;
      render();
    });

    ipcRenderer.on('workflow-status', (event, msg) => {
      appState.status = msg;
      
      if (msg.includes('✅ Hoàn tất toàn bộ quy trình!')) {
        appState.mode = 'idle';
        appState.progress = 100;
        appState.status = `✅ Video lưu tại: ${appState.outputPath ? 'Thư mục tùy chọn' : 'Downloads/eigu/outputs'}!`;
        appState.file = null;
        appState.youtubeLink = '';
      } else if (msg.includes('❌ Lỗi') || msg.includes('❌ Đã hủy')) {
        appState.mode = appState.file ? 'local' : (appState.youtubeLink ? 'youtube' : 'idle');
        appState.progress = 0;
      }
      render();
    });

    ipcRenderer.on('log', (event, msg) => {
      addLog(msg);
    });

    // Initial render
    addLog('[SYSTEM] EIGU Anti-Detect Engine initialized. Ready for operations.');
    render();
  </script>
</body>
</html>
