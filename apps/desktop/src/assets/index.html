<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>EIGU Desktop Worker</title>
  <style>
    body {
      background-color: #161821;
      color: #f0f0f5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      padding: 30px;
      margin: 0;
      text-align: center;
    }
    .logo {
      font-size: 24px;
      font-weight: bold;
      color: #6366f1;
      margin-bottom: 10px;
    }
    .status {
      margin-top: 20px;
      padding: 15px;
      background: #0d0f14;
      border-radius: 8px;
      border: 1px solid #333;
    }
    .pulse {
      display: inline-block;
      width: 10px;
      height: 10px;
      background-color: #10b981;
      border-radius: 50%;
      margin-right: 8px;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
      70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
      100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
    }
  </style>
</head>
<body>
  <div class="logo">EIGU Anti-detect Engine</div>
  <p>Hệ thống đang chạy ngầm dưới quyền Desktop Client.</p>
  
  <div class="status">
    <div style="display: flex; align-items: center; justify-content: center;">
      <div class="pulse"></div>
      <span id="status-text">Đang kết nối tới API Gateway...</span>
    </div>
  </div>
</body>
</html>
